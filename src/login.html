<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/estilo_cont.css">
    <link rel="stylesheet" href="css/estilo_nav.css">
    <script src="javaScript/loginJs.js" defer></script>
    <title>roomie - Iniciar sesión</title>
</head>
<body>
    
    <div class="navegador">
        <img src="img/logo.png" alt="Logo Roomie">
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Buscar</a></li>
            <li><a href="login.html" class="btn_inicio">Iniciar Sesión</a></li>
            <li><a href="registro.html" class="btn_registro">Registrarse</a></li>
        </ul>
    </div>

    <div class="contenedor">
        <img src="img/logo.png" alt="Logo Roomie">
        
        <h1>Bienvenido/a de nuevo</h1>
        <p class="gris">Inicia sesión para continuar</p>
        <br>

        <div class="formu">
            <form action="#" method="POST">
                <label for="email">Correo electrónico</label><br>
                <input type="email" name="email" id="email" placeholder="tu@email.com" required><br>

                <label for="pwd">Contraseña</label><br>
                <input type="password" name="pwd" id="pwd" placeholder="........" required><br>
                
                <a href="#" class="enlace">¿Olvidaste tu contraseña?</a>

                <button id="crear">Iniciar sesión</button>
            </form>

            <p>
                ¿No tienes cuenta? <a href="registro.html" class="enlace">Regístrate gratis</a>
            </p>
        </div>
    </div>

</body>
</html>
