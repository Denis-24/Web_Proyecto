<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buscar habitaciones – Roomie</title>
    <meta name="description"
        content="Busca habitaciones disponibles por zonas universitarias. Filtra por precio, características y más en Roomie." />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />
    <style>
        /* ---- Map Marker Styles ---- */
        .custom-marker {
            background: none;
            border: none;
        }

        .marker-pin {
            background: var(--teal, #2D6E65);
            color: white;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            white-space: nowrap;
            box-shadow: 0 4px 12px rgba(45, 110, 101, 0.4);
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .marker-pin::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid var(--teal, #2D6E65);
        }

        .marker-pin.active {
            background: var(--yellow, #F5C842);
            color: var(--dark, #1A1A2E);
            transform: scale(1.15);
            box-shadow: 0 6px 20px rgba(245, 200, 66, 0.5);
            z-index: 1000 !important;
        }

        .marker-pin.active::after {
            border-top-color: var(--yellow, #F5C842);
        }

        .marker-pin:hover {
            transform: scale(1.1);
            z-index: 999 !important;
        }

        /* ---- Popup Styles ---- */
        .roomie-popup .leaflet-popup-content-wrapper {
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(45, 110, 101, 0.1);
        }

        .roomie-popup .leaflet-popup-content {
            margin: 0;
            min-width: 250px;
        }

        .roomie-popup .leaflet-popup-tip {
            background: white;
        }

        .map-popup {
            padding: 16px;
            font-family: 'Outfit', sans-serif;
        }

        .map-popup-title {
            font-weight: 700;
            color: #1A1A2E;
            font-size: 1.05rem;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .map-popup-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: #2D6E65;
            margin-bottom: 6px;
        }

        .map-popup-location {
            font-size: 0.85rem;
            color: #64748b;
            margin-bottom: 12px;
        }

        .map-popup-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .map-popup .popup-tag {
            background: #EAF4F2;
            color: #2D6E65;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .map-popup-btn {
            width: 100%;
            font-size: 0.9rem !important;
            padding: 10px !important;
            border-radius: 100px !important;
        }

        /* ---- Map Container & Layout Overrides ---- */
        html, body {
            height: 100%;
            overflow-x: hidden;
        }

        .search-page {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding-top: 130px; /* Suficiente altura para despejar el navbar fijo flotante */
            background: transparent;
        }

        .search-header {
            flex-shrink: 0;
            background: var(--white) !important;
            padding: 24px 0 16px 0 !important;
            border-bottom: 1px solid var(--gray-100);
            z-index: 10;
        }

        .search-layout {
            display: grid !important;
            grid-template-columns: minmax(450px, 45%) 1fr !important;
            max-width: none !important;
            width: 100% !important;
            padding: 0 !important;
            margin: 0 !important;
            flex: 1; /* Rellenar el espacio sobrante de la pantalla */
            min-height: 0; /* Important for flex child to be scrollable */
            overflow: hidden;
        }

        .rooms-panel {
            overflow-y: auto !important;
            padding: 24px 32px 24px 48px !important; /* Más margen a la izquierda para acercarlo estéticamente al container */
            background: transparent !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 20px !important;
            height: 100%;
            /* Custom scrollbar para la lista */
            scrollbar-width: thin;
            scrollbar-color: var(--gray-300) var(--gray-100);
        }

        .rooms-panel::-webkit-scrollbar {
            width: 8px;
        }
        .rooms-panel::-webkit-scrollbar-track {
            background: var(--gray-100);
        }
        .rooms-panel::-webkit-scrollbar-thumb {
            background: var(--gray-300);
            border-radius: 10px;
        }

        .map-panel {
            position: relative !important;
            height: 100% !important;
            width: 100% !important;
            top: auto !important;
            /* Añadido espacio en borde derecho y abajo solicitado por usuario */
            padding: 24px 24px 24px 16px !important; 
        }

        #mapContainer {
            width: 100%;
            height: 100%;
            z-index: 1;
            border-radius: 16px !important;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1); /* Efecto tarjeta flotante */
            overflow: hidden;
        }

        /* Corregir las tarjetas de habitaciones en este layout */
        .room-card {
            margin: 0 !important;
            width: 100% !important;
            min-height: 200px !important;
        }

        .room-card-img {
            flex-shrink: 0 !important;
            width: 220px !important;
        }

        @media (max-width: 1100px) {
            .search-layout {
                grid-template-columns: 50% 50% !important;
            }
            .room-card {
                flex-direction: column !important;
            }
            .room-card-img {
                width: 100% !important;
                height: 200px !important;
            }
        }

        @media (max-width: 850px) {
            .search-page {
                height: auto;
                display: block;
            }
            .search-header {
                padding: 20px !important;
            }
            .search-layout {
                display: flex !important;
                flex-direction: column-reverse !important;
                height: auto !important;
                overflow: visible !important;
            }
            .map-panel {
                height: 450px !important;
                border-left: none;
                border-bottom: 1px solid var(--gray-100);
            }
            .rooms-panel {
                height: auto !important;
                overflow: visible !important;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="Roomie" class="logo-img" />
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="nav-link">Inicio</a></li>
                <li><a href="buscar.html" class="nav-link active">Buscar</a></li>
                <li id="navAuth">
                    <a href="login.html" class="btn btn-outline">Iniciar sesión</a>
                    <a href="registro.html" class="btn btn-primary" style="margin-left:8px;">Registrarse</a>
                </li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="Menú">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- SEARCH PAGE -->
    <div class="search-page">

        <!-- Header / Filtros -->
        <div class="search-header">
            <div class="container">
                <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 16px;">
                    <div>
                        <h1 style="font-size: 2rem; color:var(--dark); margin-bottom:4px;">Buscar habitaciones</h1>
                        <p style="color:var(--gray-500); margin:0;">Encuentra tu habitación ideal en más de 20 ciudades.</p>
                    </div>
                    <div style="font-size:0.9rem; color:var(--gray-500); font-weight:600; padding-bottom:4px;">
                        100% Anuncios Verificados ✅
                    </div>
                </div>
                
                <div class="search-filters-bar" style="background:var(--gray-100); padding:8px 10px; border-radius:100px; border:1px solid var(--gray-300); display:flex; gap:8px;">
                    <input type="text" id="searchQuery" class="filter-input"
                        placeholder="🔍 Ciudad, barrio, universidad..." style="flex:1.5; min-width:200px; border:none; box-shadow:none; padding:12px 20px; background:var(--white); font-size:1rem; border-right:1px solid var(--gray-300); border-radius:100px 0 0 100px; outline:none; color:var(--dark);" />
                        
                    <select class="filter-input" id="filterPrecio" style="flex:1; border:none; box-shadow:none; background:transparent; outline:none; font-size:0.95rem; color:var(--dark);">
                        <option value="">💰 Todo el rango</option>
                        <option value="300">Hasta 300€/mes</option>
                        <option value="400">Hasta 400€/mes</option>
                        <option value="500">Hasta 500€/mes</option>
                        <option value="700">Hasta 700€/mes</option>
                        <option value="1000">Hasta 1.000€/mes</option>
                    </select>
                    
                    <select class="filter-input" id="filterTipo" style="flex:1; border:none; border-left:1px solid var(--gray-300); border-radius:0; box-shadow:none; background:transparent; outline:none; font-size:0.95rem; color:var(--dark);">
                        <option value="">🏠 Todos los tipos</option>
                        <option value="individual">Individual</option>
                        <option value="compartida">Compartida</option>
                        <option value="estudio">Estudio</option>
                    </select>
                    
                    <select class="filter-input" id="filterOpciones" style="flex:1; border:none; border-left:1px solid var(--gray-300); border-radius:0; box-shadow:none; background:transparent; outline:none; font-size:0.95rem; color:var(--dark);">
                        <option value="">✨ Sin filtros</option>
                        <option value="wifi">Wifi incluido</option>
                        <option value="mascotas">Mascotas permitidas</option>
                        <option value="empadronamiento">Permite empadronamiento</option>
                        <option value="amueblada">Totalmente amueblada</option>
                    </select>
                    
                    <button class="btn btn-primary" id="searchBtn" onclick="aplicarFiltros()" style="border-radius:100px; padding:12px 36px; font-weight:700; font-size:0.95rem; background:var(--teal); color:white; border:none; flex-shrink:0;">Buscar</button>
                </div>
            </div>
        </div>

        <!-- Indicador de Resultados -->
        <div style="background:var(--white); border-bottom:1px solid var(--gray-100); padding:12px 0; z-index:5;">
            <div class="container" style="display:flex; align-items:center; justify-content:space-between;">
                <div id="resultsCount" style="font-size:0.95rem; color:var(--dark); font-weight:700;">
                    <span id="numResults">0</span> alojamientos encontrados
                </div>
                <div style="display:flex; align-items:center;">
                    <span style="font-size:0.85rem; color:var(--gray-500); margin-right:8px;">Ordenar por:</span>
                    <select id="sortSelect" onchange="sortResults(this.value)"
                        style="border:1px solid var(--gray-300); background:var(--gray-100); font-family:var(--font); font-size:0.85rem; color:var(--dark); font-weight:600; cursor:pointer; padding:6px 16px; border-radius:20px; outline:none;">
                        <option value="relevancia">⭐ Reales Recomendados</option>
                        <option value="precio-asc">💸 Precio: menor primero</option>
                        <option value="precio-desc">💰 Precio: mayor primero</option>
                        <option value="reciente">🆕 Más recientes</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Layout: List + Map -->
        <div class="search-layout">

            <!-- LEFT: Room List -->
            <div class="rooms-panel" id="roomsPanel">
                <div style="text-align:center;padding:48px 24px;color:var(--gray-500);">
                    <div style="font-size:2rem;margin-bottom:12px;">⏳</div>
                    <p>Cargando habitaciones...</p>
                </div>
            </div>

            <!-- RIGHT: Interactive Map -->
            <div class="map-panel">
                <div id="mapContainer" style="width:100%;height:100%;"></div>
            </div>

        </div>
    </div>

    <!-- MODAL: Room Detail -->
    <div class="modal-overlay" id="modalOverlay" onclick="cerrarModal(event)">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Detalles de la habitación</h3>
                <button class="modal-close" onclick="cerrarModal()" aria-label="Cerrar">✕</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    <script src="js/main.js"></script>
    <script src="js/buscar.js"></script>
</body>

</html>
