<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión – Roomie</title>
    <meta name="description" content="Accede a tu cuenta de Roomie para buscar o gestionar habitaciones." />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="Roomie" class="logo-img" />
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="nav-link">Inicio</a></li>
                <li><a href="buscar.html" class="nav-link">Buscar</a></li>
                <li id="navAuth">
                    <a href="registro.html" class="btn btn-primary">Crear cuenta</a>
                </li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="Menú">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- LOGIN PAGE -->
    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="logo.png" alt="Roomie" />
            </div>
            <h1 class="auth-title">Bienvenido/a de nuevo</h1>
            <p class="auth-subtitle">Inicia sesión para continuar</p>

            <div class="alert alert-error" id="loginError" role="alert">
                <span>⚠️</span> <span id="loginErrorMsg">Usuario o contraseña incorrectos.</span>
            </div>

            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label class="form-label" for="loginEmail">Correo electrónico</label>
                    <div class="input-group">
                        <span class="input-icon">📧</span>
                        <input type="email" id="loginEmail" class="form-input" placeholder="tu@email.com"
                            autocomplete="email" required />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="loginPassword">Contraseña</label>
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••"
                            autocomplete="current-password" required />
                        <button type="button" class="input-end" onclick="togglePassword('loginPassword', this)"
                            aria-label="Mostrar/ocultar contraseña">👁️</button>
                    </div>
                </div>

                <div style="display:flex;justify-content:flex-end;margin-bottom:24px;">
                    <a href="#" style="font-size:0.85rem;color:var(--teal);font-weight:600;">¿Olvidaste tu
                        contraseña?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
                    Iniciar sesión
                </button>
            </form>

            <div class="form-divider"><span>o continúa con</span></div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <button class="btn btn-outline" id="googleBtn" onclick="loginSocial('Google')">
                    🌐 Google
                </button>
                <button class="btn btn-outline" id="facebookBtn" onclick="loginSocial('Facebook')">
                    📘 Facebook
                </button>
            </div>

            <p class="auth-link">
                ¿No tienes cuenta? <a href="registro.html">Regístrate gratis</a>
            </p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
