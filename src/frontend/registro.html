<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cuenta – Roomie</title>
    <meta name="description"
        content="Crea tu cuenta en Roomie como inquilino o arrendador y empieza a usar la plataforma hoy." />
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <img src="logo.png" alt="Roomie" class="logo-img" />
            </a>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html" class="nav-link">Inicio</a></li>
                <li><a href="buscar.html" class="nav-link">Buscar</a></li>
                <li id="navAuth">
                    <a href="login.html" class="btn btn-outline">Iniciar sesión</a>
                </li>
            </ul>
            <button class="hamburger" id="hamburger" aria-label="Menú">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>

    <!-- REGISTRO PAGE -->
    <div class="auth-page">
        <div class="auth-card" style="max-width:580px;">
            <div class="auth-logo">
                <img src="logo.png" alt="Roomie" />
            </div>
            <h1 class="auth-title">Crea tu cuenta gratis</h1>
            <p class="auth-subtitle">¿Cómo quieres usar Roomie?</p>

            <!-- Selector Tipo -->
            <div class="tipo-toggle" id="tipoToggle">
                <button type="button" class="tipo-btn active" id="btnInquilino" onclick="seleccionarTipo('inquilino')"
                    data-tipo="inquilino" aria-pressed="true">
                    <span class="tipo-icon">🎓</span>
                    <span class="tipo-label">Soy inquilino</span>
                    <small style="color:var(--gray-500);font-size:0.75rem;">Busco habitación</small>
                </button>
                <button type="button" class="tipo-btn" id="btnArrendador" onclick="seleccionarTipo('arrendador')"
                    data-tipo="arrendador" aria-pressed="false">
                    <span class="tipo-icon">🏡</span>
                    <span class="tipo-label">Soy arrendador</span>
                    <small style="color:var(--gray-500);font-size:0.75rem;">Alquilo habitación</small>
                </button>
            </div>

            <input type="hidden" id="tipoUsuario" value="inquilino" />

            <div class="alert alert-error" id="regError" role="alert">
                <span>⚠️</span> <span id="regErrorMsg">Por favor, completa todos los campos.</span>
            </div>
            <div class="alert alert-success" id="regSuccess" role="alert">
                <span>✅</span> <span>¡Cuenta creada con éxito! Redirigiendo...</span>
            </div>

            <form id="registroForm" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label" for="regNombre">Nombre</label>
                        <input type="text" id="regNombre" class="form-input" placeholder="Tu nombre" required />
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="regApellidos">Apellidos</label>
                        <input type="text" id="regApellidos" class="form-input" placeholder="Tus apellidos" required />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regEmail">Correo electrónico</label>
                    <div class="input-group">
                        <span class="input-icon">📧</span>
                        <input type="email" id="regEmail" class="form-input" placeholder="tu@email.com"
                            autocomplete="email" required />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regTelefono">Teléfono</label>
                    <div class="input-group">
                        <span class="input-icon">📞</span>
                        <input type="tel" id="regTelefono" class="form-input" placeholder="+34 600 000 000" />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regPassword">Contraseña</label>
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="regPassword" class="form-input" placeholder="Mínimo 8 caracteres"
                            autocomplete="new-password" required />
                        <button type="button" class="input-end" onclick="togglePassword('regPassword', this)"
                            aria-label="Ver contraseña">👁️</button>
                    </div>
                    <div id="pwdStrength" style="margin-top:8px;"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="regPassword2">Confirmar contraseña</label>
                    <div class="input-group">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="regPassword2" class="form-input" placeholder="Repite la contraseña"
                            autocomplete="new-password" required />
                    </div>
                </div>

                <div class="form-group" style="display:flex;align-items:flex-start;gap:10px;">
                    <input type="checkbox" id="regTerminos" style="margin-top:4px;accent-color:var(--teal);" required />
                    <label for="regTerminos" style="font-size:0.88rem;color:var(--gray-500);cursor:pointer;">
                        Acepto los <a href="#" style="color:var(--teal);font-weight:600;">Términos y condiciones</a> y
                        la
                        <a href="#" style="color:var(--teal);font-weight:600;">Política de privacidad</a>
                    </label>
                </div>

                <button type="submit" class="btn btn-primary btn-full btn-lg" id="regBtn">
                    Crear cuenta gratis
                </button>
            </form>

            <p class="auth-link">
                ¿Ya tienes cuenta? <a href="login.html">Iniciar sesión</a>
            </p>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>
